<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClyraMotion Premium Player with Subtitles</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-glow: #00f2fe; --secondary-glow: #4facfe; --bg-color: #0d0e12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .player-container { position: relative; width: 100%; height: 100vh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Subtitle Styling (සබ්ටයිටල් පේන පෙනුම ලස්සන කරන්න) */
        video::cue {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-family: 'Inter', sans-serif;
        }

        .video-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(13, 14, 18, 0.95)); padding: 20px; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 2; }
        .player-container:hover .video-controls { opacity: 1; pointer-events: auto; }
        .progress-area { height: 6px; width: 100%; background: rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; margin-bottom: 15px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary-glow), var(--primary-glow)); border-radius: 10px; }
        .control-buttons { display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .controls-left, .controls-right { display: flex; align-items: center; gap: 18px; }
        .material-icons { cursor: pointer; font-size: 26px; transition: 0.1s; user-select: none; }
        .material-icons:hover { color: var(--primary-glow); transform: scale(1.1); }
        .time-display { font-size: 13px; color: rgba(255,255,255,0.8); }
        .speed-dropdown { position: relative; display: inline-block; }
        .speed-options { display: none; position: absolute; bottom: 35px; right: 0; background: rgba(20, 21, 26, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; backdrop-filter: blur(10px); list-style: none; padding: 5px 0; min-width: 80px; }
        .speed-dropdown:hover .speed-options { display: block; }
        .speed-options li { padding: 8px 12px; font-size: 13px; text-align: center; cursor: pointer; }
        .speed-options li:hover { background: rgba(0, 242, 254, 0.2); color: var(--primary-glow); }
        
        /* Subtitle Button Active state */
        .sub-active { color: var(--primary-glow) !important; }

        .spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary-glow); border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 1; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

<div class="player-container" id="player">
    <div class="spinner" id="loading-spinner"></div>
    <video id="main-video" crossorigin="anonymous">
        </video>
    
    <div class="video-controls">
        <div class="progress-area" id="progress-container"><div class="progress-bar" id="bar"></div></div>
        <div class="control-buttons">
            <div class="controls-left">
                <i class="material-icons" id="play-btn">play_arrow</i>
                <i class="material-icons" id="rewind-btn">replay_10</i>
                <i class="material-icons" id="forward-btn">forward_10</i>
                <div class="time-display"><span id="current-time">0:00</span> / <span id="duration">0:00</span></div>
            </div>
            <div class="controls-right">
                <i class="material-icons sub-active" id="cc-btn">subtitles</i>

                <div class="speed-dropdown">
                    <i class="material-icons">slow_motion_video</i>
                    <ul class="speed-options" id="speed-opts">
                        <li data-speed="0.5">0.5x</li>
                        <li data-speed="1" style="color:var(--primary-glow)">Normal</li>
                        <li data-speed="1.5">1.5x</li>
                        <li data-speed="2">2x</li>
                    </ul>
                </div>
                <i class="material-icons" id="pip-btn">picture_in_picture_alt</i>
                <i class="material-icons" id="fullscreen-btn">fullscreen</i>
            </div>
        </div>
    </div>
</div>

<script>
    // Cloudflare Worker Proxy
    const PROXY_URL = "https://muddy-cherry-02d2.bigunbimsara22.workers.dev/?url=";
    
    const player = document.getElementById('player');
    const video = document.getElementById('main-video');
    const playBtn = document.getElementById('play-btn');
    const progressContainer = document.getElementById('progress-container');
    const bar = document.getElementById('bar');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const spinner = document.getElementById('loading-spinner');
    const speedOpts = document.querySelectorAll('#speed-opts li');
    const ccBtn = document.getElementById('cc-btn');
    
    // URL එකෙන් වීඩියෝ සහ සබ්ටයිටල් ලින්ක්ස් ගන්නවා
    const urlParams = new URLSearchParams(window.location.search);
    const videoSource = urlParams.get('file');
    const subSource = urlParams.get('sub'); // ?sub=SUBTITLE_VTT_URL
    
    // 1. වීඩියෝ එක ලෝඩ් කිරීම
    if(videoSource) {
        video.src = PROXY_URL + encodeURIComponent(videoSource);
    } else {
        alert("කරුණාකර වීඩියෝ ලින්ක් එකක් ඇතුලත් කරන්න! (?file=...)");
    }

    // 2. සබ්ටයිටල් එක ලෝඩ් කිරීම (CORS බ්ලොක් නොවෙන්න Cloudflare Worker එක හරහාම යවමු)
    if(subSource) {
        const track = document.createElement('track');
        track.kind = 'captions';
        track.label = 'English / Sinhala';
        track.srclang = 'en';
        track.src = PROXY_URL + encodeURIComponent(subSource); // සබ් එකත් ප්‍රොක්සි කරනවා
        track.default = true; // Auto සබ්ටයිටල් ඔන් වෙන්න
        video.appendChild(track);
    } else {
        ccBtn.style.display = 'none'; // සබ්ටයිටල් ලින්ක් එකක් නැත්නම් CC බටන් එක හංගනවා
    }

    // CC Button Click - Subtitle On/Off
    ccBtn.addEventListener('click', () => {
        const trackMode = video.textTracks[0];
        if (trackMode.mode === 'showing') {
            trackMode.mode = 'disabled';
            ccBtn.classList.remove('sub-active');
        } else {
            trackMode.mode = 'showing';
            ccBtn.classList.add('sub-active');
        }
    });

    // ප්ලේයර් එකේ සාමාන්‍ය ෆන්ක්ෂන් ටික
    function togglePlay() {
        if (video.paused) { video.play(); playBtn.innerText = 'pause'; } 
        else { video.pause(); playBtn.innerText = 'play_arrow'; }
    }
    playBtn.addEventListener('click', togglePlay);
    video.addEventListener('click', togglePlay);
    document.getElementById('forward-btn').addEventListener('click', () => video.currentTime += 10);
    document.getElementById('rewind-btn').addEventListener('click', () => video.currentTime -= 10);

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault
